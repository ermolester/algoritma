<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Akış Şeması Simülatörü</title>

<style>
body {
    font-family: Arial;
    background:#f2f2f2;
    text-align:center;
}

.container {
    width: 500px;
    margin: auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input, select {
    padding:8px;
    margin:5px;
    width: 90%;
}

button {
    padding:10px;
    margin:5px;
    width: 95%;
    cursor:pointer;
}

.step {
    background:#e0e0e0;
    margin:5px;
    padding:8px;
    border-radius:5px;
}

#output {
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Akış Şeması Simülatörü</h2>

<select id="type">
    <option value="input">Input (Sayı al)</option>
    <option value="output">Output (Göster)</option>
    <option value="add">Toplama</option>
    <option value="multiply">Çarpma</option>
    <option value="factorial">Faktöriyel</option>
</select>

<input id="value" placeholder="Değer (örn: 5 veya x)">

<button onclick="addStep()">Adım Ekle</button>

<div id="steps"></div>

<button onclick="run()">▶ Çalıştır</button>

<div id="output"></div>

</div>

<script>

let steps = [];
let memory = {};

function addStep(){
    let type = document.getElementById("type").value;
    let value = document.getElementById("value").value;

    steps.push({type, value});
    render();
}

function render(){
    let html = "";
    steps.forEach((s,i)=>{
        html += `<div class="step">${i+1}. ${s.type} → ${s.value}</div>`;
    });
    document.getElementById("steps").innerHTML = html;
}

function run(){
    memory = {};
    let out = "";

    steps.forEach(step=>{
        if(step.type === "input"){
            memory["x"] = Number(prompt("Sayı gir:"));
        }

        else if(step.type === "output"){
            let val = step.value;
            if(val === "x") val = memory["x"];
            out += val + " ";
        }

        else if(step.type === "add"){
            memory["x"] = (memory["x"] || 0) + Number(step.value);
        }

        else if(step.type === "multiply"){
            memory["x"] = (memory["x"] || 1) * Number(step.value);
        }

        else if(step.type === "factorial"){
            let n = memory["x"] || Number(step.value);
            let f = 1;
            for(let i=1;i<=n;i++) f *= i;
            memory["x"] = f;
        }
    });

    document.getElementById("output").innerText = "Sonuç: " + out + (memory["x"] ? " | x=" + memory["x"] : "");
}

</script>

</body>
</html>
