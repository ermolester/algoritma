<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Akış Şeması Çizici</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f4f4;
}

canvas {
    background: white;
    border: 1px solid #ccc;
    margin-top: 10px;
}

.container {
    margin: auto;
    width: 900px;
}

button {
    padding: 10px;
    margin: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>Akış Şeması Simülatörü</h2>

<div class="container">

<button onclick="addNode('start')">Başla</button>
<button onclick="addNode('input')">Input</button>
<button onclick="addNode('process')">İşlem (+1)</button>
<button onclick="addNode('output')">Output</button>
<button onclick="addNode('end')">Bitiş</button>

<button onclick="run()">▶ Çalıştır</button>

<canvas id="c" width="900" height="500"></canvas>

</div>

<script>

let canvas = document.getElementById("c");
let ctx = canvas.getContext("2d");

let nodes = [];
let x = 50;

function draw(){
    ctx.clearRect(0,0,900,500);

    nodes.forEach((n,i)=>{
        ctx.fillStyle = "#ddd";
        ctx.fillRect(n.x, 100, 120, 50);

        ctx.fillStyle = "#000";
        ctx.fillText(n.type, n.x+30, 130);

        if(i > 0){
            ctx.beginPath();
            ctx.moveTo(nodes[i-1].x+120, 125);
            ctx.lineTo(n.x, 125);
            ctx.stroke();
        }
    });
}

function addNode(type){
    nodes.push({type, x});
    x += 150;
    draw();
}

function run(){
    let value = 0;

    nodes.forEach(n=>{
        if(n.type === "input"){
            value = Number(prompt("Sayı gir:"));
        }

        else if(n.type === "process"){
            value = value + 1;
        }

        else if(n.type === "output"){
            alert("Çıkış: " + value);
        }
    });
}

draw();

</script>

</body>
</html>
